<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>贝优 - 大学录取信息整理系统 | 登录</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300..700;1,9..40,300..700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --primary-light: #eef2ff;
            --bg: #f8fafc;
            --surface: #ffffff;
            --text: #0f172a;
            --text-secondary: #475569;
            --text-muted: #94a3b8;
            --border: #e2e8f0;
            --error: #ef4444;
            --success: #22c55e;
            --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
        }

        /* ===== 左侧品牌区 ===== */
        .brand-side {
            flex: 1;
            background: linear-gradient(135deg, #3730a3 0%, #4f46e5 50%, #6366f1 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 80px;
            position: relative;
            overflow: hidden;
        }

        .brand-side::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 70% 30%, rgba(255,255,255,0.12) 0%, transparent 60%);
        }

        .brand-content {
            position: relative;
            z-index: 1;
            color: white;
        }

        .brand-logo {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 48px;
            animation: fadeSlide 0.8s var(--ease-out) both;
        }

        .brand-logo-icon {
            width: 56px;
            height: 56px;
            background: rgba(255,255,255,0.15);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Instrument Serif', serif;
            font-size: 28px;
            font-weight: 400;
            backdrop-filter: blur(8px);
        }

        .brand-logo-text {
            font-family: 'Instrument Serif', serif;
            font-size: 24px;
            font-weight: 400;
            letter-spacing: 0.02em;
        }

        .brand-title {
            font-family: 'Instrument Serif', serif;
            font-size: clamp(36px, 4vw, 52px);
            font-weight: 400;
            line-height: 1.2;
            margin-bottom: 20px;
            animation: fadeSlide 0.8s var(--ease-out) 0.1s both;
        }

        .brand-subtitle {
            font-size: 18px;
            font-weight: 300;
            opacity: 0.8;
            margin-bottom: 56px;
            animation: fadeSlide 0.8s var(--ease-out) 0.2s both;
        }

        .brand-features {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .feature-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 18px;
            background: rgba(255,255,255,0.08);
            border-radius: 12px;
            backdrop-filter: blur(8px);
            transition: transform 0.3s var(--ease-out), background 0.2s ease;
            animation: fadeSlide 0.6s var(--ease-out) both;
        }

        .feature-item:nth-child(1) { animation-delay: 0.3s; }
        .feature-item:nth-child(2) { animation-delay: 0.4s; }
        .feature-item:nth-child(3) { animation-delay: 0.5s; }

        .feature-item:hover {
            transform: translateX(6px);
            background: rgba(255,255,255,0.12);
        }

        .feature-icon {
            width: 40px;
            height: 40px;
            background: rgba(255,255,255,0.15);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .feature-text {
            font-size: 15px;
            font-weight: 500;
        }

        /* ===== 右侧登录表单 ===== */
        .form-side {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 60px;
            background: var(--surface);
        }

        .form-container {
            width: 100%;
            max-width: 400px;
            animation: fadeSlide 0.8s var(--ease-out) 0.2s both;
        }

        .form-header {
            margin-bottom: 40px;
        }

        .form-header h1 {
            font-family: 'Instrument Serif', serif;
            font-size: 28px;
            font-weight: 400;
            margin-bottom: 8px;
        }

        .form-header p {
            color: var(--text-secondary);
            font-size: 15px;
        }

        /* 表单元素 */
        .form-group {
            margin-bottom: 24px;
        }

        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
            color: var(--text);
        }

        .input-wrapper {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            pointer-events: none;
            transition: color 0.2s ease;
        }

        .form-input {
            width: 100%;
            padding: 14px 16px 14px 48px;
            border: 1.5px solid var(--border);
            border-radius: 12px;
            font-size: 15px;
            font-family: inherit;
            color: var(--text);
            background: var(--surface);
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
            outline: none;
        }

        .form-input::placeholder { color: var(--text-muted); }

        .form-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px var(--primary-light);
        }

        .form-input:focus ~ .input-icon { color: var(--primary); }

        .form-input.error {
            border-color: var(--error);
            box-shadow: 0 0 0 4px rgba(239,68,68,0.1);
        }

        .error-msg {
            font-size: 13px;
            color: var(--error);
            margin-top: 6px;
            display: none;
        }

        .error-msg.show { display: block; }

        /* 密码显示切换 */
        .pwd-toggle {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 4px;
            display: flex;
            align-items: center;
            transition: color 0.2s;
        }

        .pwd-toggle:hover { color: var(--text); }

        /* 记住我 + 忘记密码 */
        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-size: 14px;
            color: var(--text-secondary);
        }

        .remember-me input {
            width: 18px;
            height: 18px;
            accent-color: var(--primary);
            cursor: pointer;
        }

        .forgot-link {
            font-size: 14px;
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
        }

        .forgot-link:hover { text-decoration: underline; }

        /* 登录按钮 */
        .login-btn {
            width: 100%;
            padding: 15px 24px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: background 0.2s ease, transform 0.15s var(--ease-out), box-shadow 0.2s ease;
        }

        .login-btn:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: 0 8px 16px rgba(79,70,229,0.25);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .login-btn .spinner {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .login-btn.loading .spinner { opacity: 1; }
        .login-btn.loading .btn-text { opacity: 0; }

        .spinner-circle {
            width: 22px;
            height: 22px;
            border: 2.5px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* 分割线 */
        .divider {
            display: flex;
            align-items: center;
            gap: 16px;
            margin: 28px 0;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .divider span {
            font-size: 13px;
            color: var(--text-muted);
        }

        /* 底部注册提示 */
        .form-footer {
            text-align: center;
            font-size: 14px;
            color: var(--text-secondary);
        }

        .form-footer a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
        }

        .form-footer a:hover { text-decoration: underline; }

        /* 提示框 */
        .alert {
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 14px;
            margin-bottom: 24px;
            display: none;
            animation: fadeSlide 0.3s var(--ease-out);
        }

        .alert.show { display: block; }
        .alert.error { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }
        .alert.success { background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }

        /* 动画 */
        @keyframes fadeSlide {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 响应式 */
        @media (max-width: 1024px) {
            .brand-side { display: none; }
            .form-side { padding: 40px 24px; }
        }

        /* 键盘焦点 */
        *:focus-visible {
            outline: 2px solid var(--primary);
            outline-offset: 2px;
        }

        /* 减少动画 */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>
    <!-- 左侧品牌 -->
    <div class="brand-side">
        <div class="brand-content">
            <div class="brand-logo">
                <div class="brand-logo-icon">贝</div>
                <span class="brand-logo-text">BEIYOU</span>
            </div>
            <h1 class="brand-title">大学录取信息<br>整理系统</h1>
            <p class="brand-subtitle">智能采集 · 精准分析 · 一站式管理</p>
            <div class="brand-features">
                <div class="feature-item">
                    <div class="feature-icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
                    </div>
                    <span class="feature-text">微信文章智能采集</span>
                </div>
                <div class="feature-item">
                    <div class="feature-icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M12 20V10"/><path d="M18 20V4"/><path d="M6 20v-4"/></svg>
                    </div>
                    <span class="feature-text">多维度数据统计分析</span>
                </div>
                <div class="feature-item">
                    <div class="feature-icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                    </div>
                    <span class="feature-text">Excel/CSV 一键导出</span>
                </div>
            </div>
        </div>
    </div>

    <!-- 右侧表单 -->
    <div class="form-side">
        <div class="form-container">
            <div class="form-header">
                <h1>欢迎回来</h1>
                <p>登录您的账号以继续使用贝优系统</p>
            </div>

            <div id="alert" class="alert"></div>

            <form id="loginForm" novalidate>
                <div class="form-group">
                    <label class="form-label" for="username">用户名</label>
                    <div class="input-wrapper">
                        <input type="text" id="username" class="form-input" placeholder="请输入用户名" autocomplete="username" required>
                        <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    </div>
                    <div class="error-msg" id="usernameError">请输入用户名</div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">密码</label>
                    <div class="input-wrapper">
                        <input type="password" id="password" class="form-input" placeholder="请输入密码" autocomplete="current-password" required>
                        <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                        <button type="button" class="pwd-toggle" id="togglePwd" aria-label="显示密码">
                            <svg id="eyeIcon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                        </button>
                    </div>
                    <div class="error-msg" id="passwordError">请输入密码</div>
                </div>

                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox" id="remember"> 记住我
                    </label>
                    <a href="#" class="forgot-link">忘记密码？</a>
                </div>

                <button type="submit" class="login-btn" id="loginBtn">
                    <span class="btn-text">登 录</span>
                    <div class="spinner"><div class="spinner-circle"></div></div>
                </button>
            </form>

            <div class="divider"><span>或者</span></div>

            <div class="form-footer">
                还没有账号？<a href="/register">立即注册</a>
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('loginForm');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const loginBtn = document.getElementById('loginBtn');
        const togglePwd = document.getElementById('togglePwd');
        const eyeIcon = document.getElementById('eyeIcon');
        const alertBox = document.getElementById('alert');

        // 密码显示切换
        togglePwd.addEventListener('click', () => {
            const isPwd = passwordInput.type === 'password';
            passwordInput.type = isPwd ? 'text' : 'password';
            eyeIcon.innerHTML = isPwd 
                ? '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>'
                : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
        });

        // 清除错误状态
        usernameInput.addEventListener('input', () => {
            usernameInput.classList.remove('error');
            document.getElementById('usernameError').classList.remove('show');
        });
        passwordInput.addEventListener('input', () => {
            passwordInput.classList.remove('error');
            document.getElementById('passwordError').classList.remove('show');
        });

        // 显示提示
        function showAlert(msg, type) {
            alertBox.className = `alert show ${type}`;
            alertBox.textContent = msg;
        }

        // 表单提交
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            alertBox.className = 'alert';

            const username = usernameInput.value.trim();
            const password = passwordInput.value;
            let valid = true;

            if (!username) {
                usernameInput.classList.add('error');
                document.getElementById('usernameError').classList.add('show');
                valid = false;
            }
            if (!password) {
                passwordInput.classList.add('error');
                document.getElementById('passwordError').classList.add('show');
                valid = false;
            }
            if (!valid) return;

            loginBtn.classList.add('loading');
            loginBtn.disabled = true;

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await res.json();

                if (data.success && data.token) {
                    showAlert('登录成功，正在跳转...', 'success');
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    setTimeout(() => { window.location.href = '/'; }, 800);
                } else {
                    showAlert(data.message || '用户名或密码错误', 'error');
                }
            } catch (err) {
                showAlert('网络错误，请稍后重试', 'error');
            } finally {
                loginBtn.classList.remove('loading');
                loginBtn.disabled = false;
            }
        });

        // 回车提交
        [usernameInput, passwordInput].forEach(el => {
            el.addEventListener('keydown', e => {
                if (e.key === 'Enter') form.dispatchEvent(new Event('submit'));
            });
        });
    </script>
</body>
</html>
