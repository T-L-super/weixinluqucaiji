<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户管理 - 贝优</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300..700;1,9..40,300..700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --primary-light: #eef2ff;
            --bg: #f8fafc;
            --surface: #ffffff;
            --text: #0f172a;
            --text-secondary: #475569;
            --text-muted: #94a3b8;
            --border: #e2e8f0;
            --error: #ef4444;
            --success: #22c55e;
            --warning: #f59e0b;
            --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* ===== 顶部导航 ===== */
        .topnav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 32px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .nav-logo {
            width: 36px;
            height: 36px;
            background: var(--primary);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-family: 'Instrument Serif', serif;
            font-size: 18px;
        }

        .nav-title {
            font-family: 'Instrument Serif', serif;
            font-size: 18px;
            font-weight: 400;
        }

        .nav-user {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .user-info {
            text-align: right;
        }

        .user-name {
            font-weight: 600;
            font-size: 14px;
        }

        .user-role {
            font-size: 12px;
            color: var(--text-muted);
        }

        .logout-btn {
            padding: 8px 16px;
            border: 1.5px solid var(--border);
            border-radius: 8px;
            background: var(--surface);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .logout-btn:hover {
            border-color: var(--error);
            color: var(--error);
        }

        /* ===== 主内容区 ===== */
        .main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 32px;
        }

        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
        }

        .page-title {
            font-family: 'Instrument Serif', serif;
            font-size: 24px;
            font-weight: 400;
        }

        .add-btn {
            padding: 10px 20px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background 0.2s ease, transform 0.15s var(--ease-out);
        }

        .add-btn:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
        }

        /* ===== 用户列表 ===== */
        .users-table {
            width: 100%;
            background: var(--surface);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .users-table th,
        .users-table td {
            padding: 14px 20px;
            text-align: left;
        }

        .users-table th {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            background: #f8fafc;
            border-bottom: 1px solid var(--border);
        }

        .users-table td {
            border-bottom: 1px solid var(--border);
            font-size: 14px;
        }

        .users-table tr:last-child td { border-bottom: none; }

        .users-table tbody tr {
            transition: background 0.15s ease;
        }

        .users-table tbody tr:hover {
            background: #f8fafc;
        }

        /* 状态徽章 */
        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .badge-active {
            background: #dcfce7;
            color: #166534;
        }

        .badge-inactive {
            background: #fef2f2;
            color: #991b1b;
        }

        .badge-role {
            background: var(--primary-light);
            color: var(--primary);
        }

        /* 操作按钮 */
        .action-btns {
            display: flex;
            gap: 8px;
        }

        .action-btn {
            padding: 6px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--surface);
            font-size: 13px;
            cursor: pointer;
            transition: all 0.15s ease;
        }

        .action-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        .action-btn.danger:hover {
            border-color: var(--error);
            color: var(--error);
        }

        /* ===== 弹窗 ===== */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(4px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 200;
            animation: fadeIn 0.2s ease;
        }

        .modal-overlay.show { display: flex; }

        .modal {
            background: var(--surface);
            border-radius: 16px;
            width: 100%;
            max-width: 480px;
            padding: 32px;
            animation: slideUp 0.3s var(--ease-out);
        }

        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
        }

        .modal-title {
            font-family: 'Instrument Serif', serif;
            font-size: 20px;
            font-weight: 400;
        }

        .modal-close {
            width: 32px;
            height: 32px;
            border: none;
            background: #f1f5f9;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: var(--text-secondary);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 6px;
        }

        .form-input, .form-select {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid var(--border);
            border-radius: 10px;
            font-size: 15px;
            font-family: inherit;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
            outline: none;
        }

        .form-input:focus, .form-select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px var(--primary-light);
        }

        .modal-actions {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            margin-top: 28px;
        }

        .btn-secondary {
            padding: 10px 20px;
            border: 1.5px solid var(--border);
            border-radius: 10px;
            background: var(--surface);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
        }

        .btn-primary {
            padding: 10px 24px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        .btn-primary:hover { background: var(--primary-hover); }

        /* 提示框 */
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            padding: 14px 20px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            animation: slideUp 0.3s var(--ease-out);
            z-index: 300;
        }

        .toast-success { background: #dcfce7; color: #166534; }
        .toast-error { background: #fef2f2; color: #991b1b; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        .empty-state svg {
            width: 64px;
            height: 64px;
            margin-bottom: 16px;
            opacity: 0.4;
        }
    </style>
</head>
<body>
    <!-- 顶部导航 -->
    <nav class="topnav">
        <div class="nav-brand">
            <div class="nav-logo">贝</div>
            <span class="nav-title">贝优 · 用户管理</span>
        </div>
        <div class="nav-user">
            <div class="user-info">
                <div class="user-name" id="currentUserName">加载中...</div>
                <div class="user-role" id="currentUserRole"></div>
            </div>
            <button class="logout-btn" onclick="logout()">退出</button>
        </div>
    </nav>

    <!-- 主内容 -->
    <main class="main">
        <div class="page-header">
            <h1 class="page-title">用户列表</h1>
            <button class="add-btn" onclick="openModal()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                添加用户
            </button>
        </div>

        <table class="users-table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>用户名</th>
                    <th>邮箱</th>
                    <th>姓名</th>
                    <th>角色</th>
                    <th>状态</th>
                    <th>最后登录</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="usersList">
                <tr><td colspan="8" class="empty-state">加载中...</td></tr>
            </tbody>
        </table>
    </main>

    <!-- 添加用户弹窗 -->
    <div class="modal-overlay" id="userModal">
        <div class="modal">
            <div class="modal-header">
                <h2 class="modal-title">添加用户</h2>
                <button class="modal-close" onclick="closeModal()">×</button>
            </div>
            <form id="addUserForm" onsubmit="return addUser(event)">
                <div class="form-group">
                    <label class="form-label">用户名 *</label>
                    <input type="text" class="form-input" id="newUsername" required placeholder="请输入用户名">
                </div>
                <div class="form-group">
                    <label class="form-label">邮箱</label>
                    <input type="email" class="form-input" id="newEmail" placeholder="请输入邮箱">
                </div>
                <div class="form-group">
                    <label class="form-label">姓名</label>
                    <input type="text" class="form-input" id="newFullName" placeholder="请输入姓名">
                </div>
                <div class="form-group">
                    <label class="form-label">密码 *</label>
                    <input type="password" class="form-input" id="newPassword" required placeholder="请设置密码">
                </div>
                <div class="form-group">
                    <label class="form-label">角色</label>
                    <select class="form-select" id="newRole">
                        <option value="1">系统管理员</option>
                        <option value="2">数据管理员</option>
                        <option value="4">采集操作员</option>
                        <option value="3" selected>普通用户</option>
                    </select>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-secondary" onclick="closeModal()">取消</button>
                    <button type="submit" class="btn-primary">创建用户</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const API = '/api';
        let token = localStorage.getItem('token');

        // 检查登录状态
        if (!token) {
            window.location.href = '/login';
        }

        // 加载当前用户信息
        async function loadCurrentUser() {
            try {
                const res = await fetch(`${API}/auth/me`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.ok) {
                    const user = await res.json();
                    document.getElementById('currentUserName').textContent = user.full_name || user.username;
                    document.getElementById('currentUserRole').textContent = user.role_name;
                } else {
                    window.location.href = '/login';
                }
            } catch { window.location.href = '/login'; }
        }

        // 加载用户列表
        async function loadUsers() {
            try {
                const res = await fetch(`${API}/users`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                const tbody = document.getElementById('usersList');

                if (data.users && data.users.length > 0) {
                    tbody.innerHTML = data.users.map(u => `
                        <tr>
                            <td>${u.id}</td>
                            <td><strong>${u.username}</strong></td>
                            <td>${u.email || '-'}</td>
                            <td>${u.full_name || '-'}</td>
                            <td><span class="badge badge-role">${u.role_name || '普通用户'}</span></td>
                            <td><span class="badge ${u.is_active ? 'badge-active' : 'badge-inactive'}">${u.is_active ? '活跃' : '停用'}</span></td>
                            <td>${u.last_login ? new Date(u.last_login).toLocaleString('zh-CN') : '从未登录'}</td>
                            <td>
                                <div class="action-btns">
                                    <button class="action-btn" onclick="toggleUserStatus(${u.id}, ${!u.is_active})">${u.is_active ? '停用' : '激活'}</button>
                                    <button class="action-btn danger" onclick="deleteUser(${u.id})">删除</button>
                                </div>
                            </td>
                        </tr>
                    `).join('');
                } else {
                    tbody.innerHTML = '<tr><td colspan="8" class="empty-state">暂无用户</td></tr>';
                }
            } catch (e) {
                console.error(e);
                document.getElementById('usersList').innerHTML = '<tr><td colspan="8" class="empty-state">加载失败</td></tr>';
            }
        }

        // 弹窗控制
        function openModal() { document.getElementById('userModal').classList.add('show'); }
        function closeModal() { document.getElementById('userModal').classList.remove('show'); }

        // 添加用户
        async function addUser(e) {
            e.preventDefault();
            const data = {
                username: document.getElementById('newUsername').value.trim(),
                email: document.getElementById('newEmail').value.trim(),
                full_name: document.getElementById('newFullName').value.trim(),
                password: document.getElementById('newPassword').value,
                role_id: parseInt(document.getElementById('newRole').value)
            };

            try {
                const res = await fetch(`${API}/auth/register`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(data)
                });

                if (res.ok) {
                    showToast('用户创建成功', 'success');
                    closeModal();
                    document.getElementById('addUserForm').reset();
                    loadUsers();
                } else {
                    const err = await res.json();
                    showToast(err.detail || '创建失败', 'error');
                }
            } catch { showToast('网络错误', 'error'); }
            return false;
        }

        // 切换用户状态
        async function toggleUserStatus(userId, activate) {
            try {
                const res = await fetch(`${API}/users/${userId}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ is_active: activate })
                });
                if (res.ok) {
                    showToast(activate ? '已激活用户' : '已停用用户', 'success');
                    loadUsers();
                }
            } catch { showToast('操作失败', 'error'); }
        }

        // 删除用户
        async function deleteUser(userId) {
            if (!confirm('确定要删除此用户吗？此操作不可撤销。')) return;
            try {
                const res = await fetch(`${API}/users/${userId}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.ok) {
                    showToast('用户已删除', 'success');
                    loadUsers();
                }
            } catch { showToast('删除失败', 'error'); }
        }

        // 退出登录
        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = '/login';
        }

        // 提示
        function showToast(msg, type) {
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // 初始化
        loadCurrentUser();
        loadUsers();
    </script>
</body>
</html>
